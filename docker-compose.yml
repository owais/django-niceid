services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: niceid
      POSTGRES_PASSWORD: niceid
      POSTGRES_DB: niceid
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niceid -d niceid"]
      interval: 2s
      timeout: 5s
      retries: 10
